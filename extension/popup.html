<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TranslateSafe</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Specific overrides for the small popup window if needed */
    body {
      width: 260px;
      padding: 16px;
    }
    .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; background: #1e293b; padding: 10px; border-radius: 8px; }
    .status-label { font-size: 13px; color: #94a3b8; }
    .status-indicator { font-weight: bold; font-size: 13px; }
    .on { color: #10b981; }
    .off { color: #cbd5e1; }
    
    .key-status { font-size: 11px; color: #64748b; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; }
    .dot.connected { background: #10b981; }

    .toggle-btn {
      background: #4f46e5;
      color: white;
      border: none;
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 16px;
    }
    .toggle-btn:hover { background: #4338ca; }
    
    .shortcut-hint { font-size: 11px; color: #64748b; text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>
      <span style="background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;">TranslateSafe</span>
  </h2>
  
  <div class="status-row">
    <span class="status-label">Monitoring</span>
    <span id="status-text" class="status-indicator off">OFF</span>
  </div>

  <div class="key-status">
      <div id="key-dot" class="dot"></div>
      <span id="key-text">API Key Disconnected</span>
  </div>

  <div>
    <label>Target Language</label>
    <select id="lang-select">
          <!-- Populated by JS -->
    </select>
  </div>

  <button id="toggle-btn" class="toggle-btn">Enable Monitoring</button>
  
  <div class="shortcut-hint">Shortcut: Alt + S</div>
  <script src="popup.js"></script>
</body>
</html>
